<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Yapa Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260409-login') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <section class="auth-showcase">
            <div class="auth-showcase-badge">Yapa Shop</div>
            <h1>Panel Admin</h1>
            <p>Controla inventario, ventas y reportes desde una sola vista.</p>
            <a href="{{ url_for('store_home') }}" class="auth-link-store">Ver tienda</a>
        </section>

        <section class="auth-card">
            <div class="auth-logo">
                <span class="logo-icon">Y</span>
                <div>
                    <h2>Iniciar sesión</h2>
                    <p>Acceso solo para cuentas autorizadas</p>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" id="flash-message">{{ message }}</div>
                {% endfor %}
            {% endwith %}

            <form method="POST" class="auth-form" id="admin-login-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="btn-login">
                    Entrar al panel
                </button>
            </form>
        </section>
    </div>
</body>
</html>

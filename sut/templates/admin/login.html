<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NexoShop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-icon">N</span>
                <h1>NexoShop Admin</h1>
                <p>Panel de Administración</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" id="flash-message">{{ message }}</div>
                {% endfor %}
            {% endwith %}

            <form method="POST" class="auth-form" id="admin-login-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="********" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="btn-login">
                    Iniciar Sesión
                </button>
            </form>

            <div class="auth-hint">
                <small>admin/admin123 · operador/operador123 · visor/visor123</small>
            </div>
        </div>
    </div>
</body>
</html>

[pytest]
testpaths = tests
markers =
    admin: Tests del panel de administración
    store: Tests del storefront/tienda
    realtime: Tests de validación en tiempo real con WebSockets
    concurrent: Tests de concurrencia y paralelismo
    e2e: Tests end-to-end
    grid: Tests que requieren Selenium Grid
addopts =
    -v
    --html=reports/report.html
    --self-contained-html
    --capture=sys
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
